<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PC Screen Portfolio</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0;
        }
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #css-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* CSSレンダラーはWebGLレンダラーの上に重ねる */
            pointer-events: none; /* デフォルトではクリックを透過させる */
        }
        #css-container > div > div {
            pointer-events: auto; /* iframeだけクリックできるようにする */
        }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: #333;
            font-size: 16px;
            z-index: 100;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="info">マウスで視点を動かせます</div>
    <div id="webgl-container"></div>
    <div id="css-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

        let scene, camera, webGLRenderer, css3DRenderer;
        let controls;
        
        // --- ポートフォリオコンテンツ ---
        // パソコンの画面に表示したいHTMLコンテンツをここで定義します。
        // 自由に編集してください。
        const portfolioHTML = `
            <html lang="ja">
            <head>
                <style>
                    body { 
                        font-family: 'Inter', sans-serif; 
                        margin: 0; 
                        padding: 20px;
                        background-color: rgba(245, 245, 245, 0.9);
                        color: #333;
                        border: 2px solid #ccc;
                        border-radius: 10px;
                        overflow-y: auto;
                        height: 100%;
                        box-sizing: border-box;
                    }
                    h1 { margin-top: 0; }
                    a { color: #007bff; }
                </style>
            </head>
            <body>
                <h1>My Portfolio</h1>
                <p>このサイトは3DモデルのPC画面内に表示されています。</p>
                <p>実際にスクロールやクリックが可能です。</p>
                <ul>
                    <li><a href="#" onclick="alert('Project 1 clicked!')">プロジェクト 1</a></li>
                    <li><a href="#" onclick="alert('Project 2 clicked!')">プロジェクト 2</a></li>
                </ul>
                <p>ここにあなたの作品や自己紹介を自由に記述できます。</p>
            </body>
            </html>
        `;

        function init() {
            // --- 基本設定 ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 4);

            // --- ライト ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            // --- レンダラーの初期化 ---
            // 1. WebGLRenderer (3Dオブジェクト用)
            const webglContainer = document.getElementById('webgl-container');
            webGLRenderer = new THREE.WebGLRenderer({ antialias: true });
            webGLRenderer.setSize(window.innerWidth, window.innerHeight);
            webglContainer.appendChild(webGLRenderer.domElement);

            // 2. CSS3DRenderer (HTML要素用)
            const cssContainer = document.getElementById('css-container');
            css3DRenderer = new CSS3DRenderer();
            css3DRenderer.setSize(window.innerWidth, window.innerHeight);
            cssContainer.appendChild(css3DRenderer.domElement);

            // --- コントロール ---
            controls = new OrbitControls(camera, webGLRenderer.domElement);
            controls.target.set(0, 1, 0);
            controls.update();

            // --- 3Dオブジェクトの作成 ---
            createEnvironment();
            const screenMesh = createComputerModel();
            createCSS3DWebsite(screenMesh);
            
            // --- ウィンドウリサイズ対応 ---
            window.addEventListener('resize', onWindowResize, false);

            animate();
        }

        function createEnvironment() {
            // 床
            const floorGeometry = new THREE.PlaneGeometry(20, 20);
            const floorMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
        }
        
        function createComputerModel() {
            // この関数でパソコンの3Dモデルを作成します。
            // ここでは簡単なBoxで表現していますが、GLTFLoaderで自作モデルを読み込むことも可能です。
            const group = new THREE.Group();
            scene.add(group);

            const monitorMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });

            // モニター本体
            const monitorBody = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 1.5, 0.2),
                monitorMaterial
            );
            monitorBody.position.y = 1;
            group.add(monitorBody);

            // モニターの足
            const monitorStand = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.5, 0.5),
                monitorMaterial
            );
            monitorStand.position.y = 0.25;
            group.add(monitorStand);
            
            // 画面部分 (これがCSS3DObjectを配置する基準になる)
            // 少しだけ手前に配置して、モニター本体と重ならないようにする
            const screenGeometry = new THREE.PlaneGeometry(2.3, 1.3);
            const screenMaterial = new THREE.MeshBasicMaterial({ 
                color: 0x000000,
                transparent: true,
                opacity: 0.1 // 少しだけ黒い画面が見えるように
            });
            const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
            screenMesh.position.set(0, 1, 0.11); // Z軸を少し手前に
            group.add(screenMesh);
            
            // screenMeshを返すことで、CSSオブジェクトの位置合わせに使う
            return screenMesh;
        }

        function createCSS3DWebsite(targetMesh) {
            // --- HTML要素を3Dオブジェクトとして作成 ---
            const div = document.createElement('div');
            const iframe = document.createElement('iframe');
            
            // portfolioHTMLをData URLとしてiframeのsrcに設定
            iframe.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(portfolioHTML);
            
            // iframeのサイズをターゲットメッシュに合わせる
            // CSSレンダラーはピクセル単位で動作するため、スケールを調整
            const scale = 0.005; // この値で3D空間のサイズとピクセルサイズを調整
            iframe.style.width = `${targetMesh.geometry.parameters.width / scale}px`;
            iframe.style.height = `${targetMesh.geometry.parameters.height / scale}px`;
            iframe.style.border = 'none';

            div.appendChild(iframe);

            const cssObject = new CSS3DObject(div);
            
            // --- CSSオブジェクトをターゲットメッシュの位置に合わせる ---
            // 位置をコピー
            cssObject.position.copy(targetMesh.position);
            // 回転をコピー
            cssObject.rotation.copy(targetMesh.rotation);
            // スケールを調整
            cssObject.scale.set(scale, scale, scale);
            
            scene.add(cssObject);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            webGLRenderer.setSize(window.innerWidth, window.innerHeight);
            css3DRenderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // 2つのレンダラーでシーンを描画
            webGLRenderer.render(scene, camera);
            css3DRenderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
